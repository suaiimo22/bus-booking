<!DOCTYPE html>
<html>
<head>

<title>Sawah Jaya Bus</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.hero{
background:linear-gradient(135deg,#0d6efd,#0dcaf0);
color:white;
padding:60px 20px;
text-align:center;
}

.search-box{
background:white;
padding:25px;
border-radius:12px;
margin-top:-40px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.autocomplete-box{
position:absolute;
background:white;
border:1px solid #ddd;
width:100%;
max-height:200px;
overflow-y:auto;
z-index:999;
}

.autocomplete-item{
padding:10px;
cursor:pointer;
}

.autocomplete-item:hover{
background:#f1f1f1;
}

</style>

</head>
<body>

<div class="hero">

<h1>Sawah Jaya Bus</h1>
<p>Book Your Bus Ticket Easily</p>

</div>

<div class="container">

<div class="search-box">

<form action="/schedules.html">

<div class="row">

<div class="col-md-4 position-relative">

<label>From</label>

<input
type="text"
class="form-control"
id="from"
name="from"
placeholder="Departure city"
autocomplete="off"
required
>

<div id="fromList" class="autocomplete-box"></div>

</div>

<div class="col-md-4 position-relative">

<label>To</label>

<input
type="text"
class="form-control"
id="to"
name="to"
placeholder="Destination city"
autocomplete="off"
required
>

<div id="toList" class="autocomplete-box"></div>

</div>

<div class="col-md-3">

<label>Date</label>

<input type="date" name="date" class="form-control" required>

</div>

<div class="col-md-1 d-grid">

<label>&nbsp;</label>

<button class="btn btn-primary">Search</button>

</div>

</div>

</form>

</div>

</div>

<script>

const cities = [

"Jakarta",
"Bandung",
"Surabaya",
"Yogyakarta",
"Semarang",
"Malang",
"Denpasar",
"Medan",
"Palembang",
"Makassar",
"Bogor",
"Tangerang",
"Bekasi"

];

function autocomplete(inputId,listId){

const input = document.getElementById(inputId);
const list = document.getElementById(listId);

input.addEventListener("input",function(){

let value = this.value.toLowerCase();
list.innerHTML = "";

if(!value) return;

cities.forEach(city=>{

if(city.toLowerCase().includes(value)){

let div = document.createElement("div");
div.classList.add("autocomplete-item");
div.innerText = city;

div.onclick = ()=>{
input.value = city;
list.innerHTML="";
}

list.appendChild(div);

}

});

});

document.addEventListener("click",function(e){

if(e.target != input){

list.innerHTML="";

}

});

}

autocomplete("from","fromList");
autocomplete("to","toList");

</script>

</body>
</html>
