<!DOCTYPE html>
<html>
<head>

<title>Sawah Jaya Bus</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.hero{
background:linear-gradient(135deg,#0d6efd,#0dcaf0);
color:white;
padding:80px 20px;
text-align:center;
}

.search-card{
background:white;
padding:30px;
border-radius:12px;
margin-top:-60px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.swap-btn{
font-size:22px;
border-radius:50%;
width:45px;
height:45px;
}

.autocomplete-box{
position:absolute;
background:white;
border:1px solid #ddd;
width:100%;
max-height:200px;
overflow-y:auto;
z-index:999;
}

.autocomplete-item{
padding:10px;
cursor:pointer;
}

.autocomplete-item:hover{
background:#f1f1f1;
}

.popular a{
text-decoration:none;
margin-right:15px;
}

</style>

</head>
<body>

<div class="hero">

<h1>Sawah Jaya Bus</h1>
<p>Travel Across Indonesia Easily</p>

</div>

<div class="container">

<div class="search-card">

<form action="/schedules.html">

<div class="row g-3 align-items-end">

<div class="col-md-4 position-relative">

<label>From</label>

<input
type="text"
class="form-control"
id="from"
name="from"
placeholder="Departure city"
autocomplete="off"
required
>

<div id="fromList" class="autocomplete-box"></div>

</div>

<div class="col-md-1 text-center">

<button type="button" class="btn btn-light swap-btn" onclick="swapCities()">
⇄
</button>

</div>

<div class="col-md-4 position-relative">

<label>To</label>

<input
type="text"
class="form-control"
id="to"
name="to"
placeholder="Destination city"
autocomplete="off"
required
>

<div id="toList" class="autocomplete-box"></div>

</div>

<div class="col-md-2">

<label>Date</label>

<input type="date" name="date" class="form-control" required>

</div>

<div class="col-md-1 d-grid">

<button class="btn btn-primary">Search</button>

</div>

</div>

</form>

<hr>

<h6>Popular Routes</h6>

<div class="popular">

<a href="/schedules.html?from=Jakarta&to=Bandung" class="badge bg-light text-dark p-2">
Jakarta → Bandung
</a>

<a href="/schedules.html?from=Jakarta&to=Yogyakarta" class="badge bg-light text-dark p-2">
Jakarta → Yogyakarta
</a>

<a href="/schedules.html?from=Surabaya&to=Malang" class="badge bg-light text-dark p-2">
Surabaya → Malang
</a>

<a href="/schedules.html?from=Denpasar&to=Surabaya" class="badge bg-light text-dark p-2">
Denpasar → Surabaya
</a>

</div>

</div>

</div>

<script>

const cities = [
"Jakarta",
"Bandung",
"Surabaya",
"Yogyakarta",
"Semarang",
"Malang",
"Denpasar",
"Medan",
"Makassar",
"Palembang",
"Bogor",
"Bekasi",
"Tangerang"
];

function autocomplete(inputId,listId){

const input = document.getElementById(inputId);
const list = document.getElementById(listId);

input.addEventListener("input",function(){

let value = this.value.toLowerCase();
list.innerHTML="";

if(!value) return;

cities.forEach(city=>{

if(city.toLowerCase().includes(value)){

let div=document.createElement("div");
div.classList.add("autocomplete-item");
div.innerText=city;

div.onclick=()=>{
input.value=city;
list.innerHTML="";
}

list.appendChild(div);

}

});

});

document.addEventListener("click",function(e){

if(e.target!=input){

list.innerHTML="";

}

});

}

autocomplete("from","fromList");
autocomplete("to","toList");

function swapCities(){

let from=document.getElementById("from");
let to=document.getElementById("to");

let temp=from.value;
from.value=to.value;
to.value=temp;

}

</script>

</body>
</html>
