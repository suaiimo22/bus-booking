<!DOCTYPE html>
<html>
<head>
<title>Bus Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: #f4f6f9;
}
.navbar {
background: #0d6efd;
}
.navbar-brand {
color: white !important;
font-weight: bold;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<span class="navbar-brand">🚌 Bus Booking</span>
<div>
<a href="/my-bookings.html" class="btn btn-light btn-sm">My Bookings</a>
<button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>
</div>
</nav>

<div class="container mt-4">
<h3 class="mb-4">Available Schedules</h3>
<div class="row" id="scheduleList"></div>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
window.location.href = "/login.html";
}

async function loadSchedules() {
const res = await fetch("/schedules");
const data = await res.json();

const container = document.getElementById("scheduleList");
container.innerHTML = "";

data.forEach(s => {
const col = document.createElement("div");
col.className = "col-md-6";

col.innerHTML = `
<div class="card mb-4 shadow-sm">
<div class="card-body">
<h5 class="card-title">${s.origin} → ${s.destination}</h5>
<p class="card-text">
<b>Bus:</b> ${s.bus_name} <br>
<b>Price:</b> Rp ${s.price}
</p>
<button class="btn btn-primary" onclick="selectSeat(${s.id})">
Select Seat
</button>
</div>
</div>
`;

container.appendChild(col);
});
}

async function selectSeat(scheduleId) {
const seat = prompt("Masukkan nomor seat:");

if (!seat) return;

const res = await fetch("/bookings", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + token
},
body: JSON.stringify({
schedule_id: scheduleId,
seat_number: seat
})
});

const data = await res.json();
alert(data.message);
}

function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

loadSchedules();
</script>

</body>
</html>
