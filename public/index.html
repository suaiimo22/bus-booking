<!DOCTYPE html>
<html>
<head>

<title>Sawah Jaya Bus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#27ae60,#2ecc71);
color:white;
padding:120px 20px;
text-align:center;
}

.hero h1{
font-weight:bold;
}

/* SEARCH BOX */

.search-box{
background:white;
padding:30px;
border-radius:12px;
margin-top:-60px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* FOOTER */

footer{
margin-top:80px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">🚌 Sawah Jaya Bus</a>

<div>

<a href="index.html" class="btn btn-outline-light btn-sm me-2">Home</a>

<a href="my-bookings.html" class="btn btn-success btn-sm me-2">
My Tickets
</a>

<a href="login.html" class="btn btn-light btn-sm">
Login
</a>

</div>

</div>

</nav>

<!-- HERO -->

<div class="hero">

<h1>Book Bus Tickets Easily</h1>

<p class="lead">
Travel across cities with comfort and safety
</p>

</div>

<!-- SEARCH -->

<div class="container">

<div class="search-box">

<h4 class="mb-4">Search Bus</h4>

<div class="row g-3">

<div class="col-md-3">
<label>From</label>
<input id="origin" class="form-control" placeholder="City">
</div>

<div class="col-md-3">
<label>To</label>
<input id="destination" class="form-control" placeholder="City">
</div>

<div class="col-md-2">
<label>Date</label>
<input id="date" type="date" class="form-control">
</div>

<div class="col-md-2">
<label>Time</label>
<input id="time" type="time" class="form-control">
</div>

<div class="col-md-1">
<label>Passengers</label>
<input id="passengers" type="number" min="1" value="1" class="form-control">
</div>

<div class="col-md-1 d-flex align-items-end">
<button class="btn btn-success w-100" onclick="searchBus()">
Search
</button>
</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3">

<p class="mb-0">
© 2026 Sawah Jaya Bus • Online Bus Ticket Booking
</p>

</footer>

<script>

function searchBus(){

const origin = document.getElementById("origin").value;
const destination = document.getElementById("destination").value;
const date = document.getElementById("date").value;
const time = document.getElementById("time").value;
const passengers = document.getElementById("passengers").value;

window.location =
`schedules.html?origin=${origin}&destination=${destination}&date=${date}&time=${time}&passengers=${passengers}`;

}

</script>

</body>
</html>
