<!DOCTYPE html>
<html>
<head>

<title>Bus Booking</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.price-tag{
font-size:18px;
font-weight:bold;
color:#2563eb;
}

.seat{
width:45px;
height:45px;
border-radius:6px;
background:#e5e7eb;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.seat.selected{
background:#2563eb;
color:white;
}

.seat-grid{
display:grid;
grid-template-columns:repeat(4,50px);
gap:10px;
justify-content:center;
}

</style>

</head>

<body class="p-4">

<div class="container">

<div class="d-flex justify-content-between mb-4">

<h3>Bus Schedules</h3>

<button onclick="logout()" class="btn btn-danger">
Logout
</button>

</div>

<div class="row" id="scheduleList"></div>

</div>

<!-- SEAT MODAL -->

<div class="modal fade" id="seatModal">

<div class="modal-dialog">

<div class="modal-content p-4">

<h5>Select Seat</h5>

<div class="seat-grid mt-3" id="seatContainer"></div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const token = localStorage.getItem("token");

if (!token) window.location.href = "/login.html";

let selectedSchedule = null;
let selectedSeat = null;

const seatModal = new bootstrap.Modal(document.getElementById("seatModal"));

/* LOAD SCHEDULES */

async function loadSchedules(){

const res = await fetch("/schedules");

const data = await res.json();

const container = document.getElementById("scheduleList");

container.innerHTML="";

data.forEach(s=>{

const col=document.createElement("div");

col.className="col-md-4 mb-4";

col.innerHTML=`

<div class="card shadow-sm h-100">

<div class="card-body d-flex flex-column">

<h5>${s.origin} → ${s.destination}</h5>

<p class="text-muted">

<i class="bi bi-bus-front"></i> ${s.bus_name}

</p>

<div class="price-tag mb-3">

Rp ${s.price}

</div>

<button class="btn btn-primary mt-auto w-100"

onclick="openSeatModal(${s.id})">

Select Seat

</button>

</div>

</div>

`;

container.appendChild(col);

});

}

/* OPEN SEAT MODAL */

async function openSeatModal(scheduleId){

selectedSchedule=scheduleId;

selectedSeat=null;

const container=document.getElementById("seatContainer");

container.innerHTML="";

const res=await fetch(`/bookings/seats/${scheduleId}`,{

headers:{

Authorization:"Bearer "+token

}

});

const bookedSeats=await res.json();

for(let i=1;i<=20;i++){

const seat=document.createElement("div");

seat.className="seat";

seat.innerText=i;

if(bookedSeats.includes(i) || bookedSeats.includes(String(i))){

seat.style.background="#ccc";

seat.style.cursor="not-allowed";

}else{

seat.onclick=()=>{

document.querySelectorAll(".seat").forEach(s=>s.classList.remove("selected"));

seat.classList.add("selected");

selectedSeat=i;

confirmBooking();

};

}

container.appendChild(seat);

}

seatModal.show();

}

/* BOOK SEAT */

async function confirmBooking(){

if(!selectedSeat) return;

const res=await fetch("/bookings",{

method:"POST",

headers:{

"Content-Type":"application/json",

Authorization:"Bearer "+token

},

body:JSON.stringify({

schedule_id:selectedSchedule,

seat_number:selectedSeat

})

});

const data=await res.json();

alert(data.message);

seatModal.hide();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("token");

window.location.href="/login.html";

}

loadSchedules();

</script>

</body>

</html>
