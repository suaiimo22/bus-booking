<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "/login.html";

let selectedSchedule = null;
let selectedSeat = null;
const seatModal = new bootstrap.Modal(document.getElementById('seatModal'));

/* ================= LOAD SCHEDULES ================= */
async function loadSchedules() {
const res = await fetch("/schedules");
const data = await res.json();

const container = document.getElementById("scheduleList");
container.innerHTML = "";

data.forEach(s => {
const col = document.createElement("div");
col.className = "col-md-4 mb-4";

col.innerHTML = `
<div class="card h-100 shadow-sm">
<div class="card-body d-flex flex-column">
<h5 class="fw-bold">${s.origin} → ${s.destination}</h5>
<p class="text-muted">
<i class="bi bi-bus-front"></i> ${s.bus_name}
</p>
<div class="price-tag mb-3">Rp ${s.price}</div>
<button class="btn btn-primary mt-auto w-100"
onclick="openSeatModal(${s.id})">
<i class="bi bi-check-circle"></i> Select Seat
</button>
</div>
</div>
`;
container.appendChild(col);
});
}

/* ================= OPEN SEAT MODAL ================= */
async function openSeatModal(scheduleId) {
selectedSchedule = scheduleId;
selectedSeat = null;

const container = document.getElementById("seatContainer");
container.innerHTML = "";

const res = await fetch(`/bookings/seats/${scheduleId}`, {
headers: {
Authorization: "Bearer " + token
}
});

const bookedSeats = await res.json();

for (let i = 1; i <= 20; i++) {
const seat = document.createElement("div");
seat.className = "seat";
seat.innerText = i;

if (bookedSeats.includes(i) || bookedSeats.includes(String(i))) {
seat.style.background = "#ccc";
seat.style.cursor = "not-allowed";
seat.style.color = "#666";
} else {
seat.onclick = () => {
document.querySelectorAll(".seat").forEach(s =>
s.classList.remove("selected")
);
seat.classList.add("selected");
selectedSeat = i;
confirmBooking();
};
}

container.appendChild(seat);
}

seatModal.show();
}

/* ================= CONFIRM BOOKING ================= */
async function confirmBooking() {
if (!selectedSeat) return;

const res = await fetch("/bookings", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + token
},
body: JSON.stringify({
schedule_id: selectedSchedule,
seat_number: selectedSeat
})
});

const data = await res.json();
alert(data.message);
seatModal.hide();
}

/* ================= LOGOUT ================= */
function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

loadSchedules();
</script>
