<!DOCTYPE html>
<html>
<head>

<title>Sawah Jaya Bus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.hero{
background:#2ecc71;
color:white;
padding:100px 20px;
text-align:center;
}

.search-box{
background:white;
padding:30px;
border-radius:10px;
margin-top:-50px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">🚌 Sawah Jaya Bus</a>

<div>
<a href="login.html" class="btn btn-light">Login</a>
</div>

</div>

</nav>

<div class="hero">

<h1>Book Bus Tickets Easily</h1>
<p>Travel across cities with comfort</p>

</div>

<div class="container">

<div class="search-box">

<h4>Search Bus</h4>

<div class="row">

<div class="col-md-4">
<input id="origin" class="form-control" placeholder="From">
</div>

<div class="col-md-4">
<input id="destination" class="form-control" placeholder="To">
</div>

<div class="col-md-4">
<button class="btn btn-success w-100" onclick="searchBus()">Search</button>
</div>

</div>

</div>

</div>

<script>

function searchBus(){

const origin=document.getElementById("origin").value;
const destination=document.getElementById("destination").value;

window.location="schedules.html?origin="+origin+"&destination="+destination;

}

</script>

</body>
</html>
