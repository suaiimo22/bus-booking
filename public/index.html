<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bus Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
background: #f4f6f9;
font-family: 'Segoe UI', sans-serif;
}

.navbar {
background: linear-gradient(90deg, #0d6efd, #0b5ed7);
}

.hero-section {
background: white;
padding: 30px;
border-radius: 12px;
box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.card {
border: none;
border-radius: 12px;
transition: 0.3s;
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.price-tag {
font-size: 18px;
font-weight: bold;
color: #0d6efd;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
<div class="container">
<span class="navbar-brand fw-bold">
<i class="bi bi-bus-front-fill"></i> Bus Booking
</span>
<div>
<a href="/my-bookings.html" class="btn btn-light btn-sm me-2">
<i class="bi bi-ticket-perforated"></i> My Bookings
</a>
<button onclick="logout()" class="btn btn-danger btn-sm">
<i class="bi bi-box-arrow-right"></i> Logout
</button>
</div>
</div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

<div class="hero-section mb-4">
<h3 class="fw-bold mb-2">
<i class="bi bi-calendar-event"></i> Available Schedules
</h3>
<p class="text-muted mb-0">
Choose your destination and book your seat easily.
</p>
</div>

<div class="row" id="scheduleList"></div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const token = localStorage.getItem("token");

if (!token) {
window.location.href = "/login.html";
}

async function loadSchedules() {
const res = await fetch("/schedules");
const data = await res.json();

const container = document.getElementById("scheduleList");
container.innerHTML = "";

data.forEach(s => {
const col = document.createElement("div");
col.className = "col-md-4 mb-4";

col.innerHTML = `
<div class="card h-100 shadow-sm">
<div class="card-body d-flex flex-column">

<h5 class="card-title fw-bold">
${s.origin} → ${s.destination}
</h5>

<p class="card-text text-muted mb-2">
<i class="bi bi-bus-front"></i> ${s.bus_name}
</p>

<div class="price-tag mb-3">
Rp ${s.price}
</div>

<button class="btn btn-primary mt-auto w-100"
onclick="selectSeat(${s.id})">
<i class="bi bi-check-circle"></i> Select Seat
</button>

</div>
</div>
`;

container.appendChild(col);
});
}

async function selectSeat(scheduleId) {
const seat = prompt("Masukkan nomor seat:");

if (!seat) return;

const res = await fetch("/bookings", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + token
},
body: JSON.stringify({
schedule_id: scheduleId,
seat_number: seat
})
});

const data = await res.json();
alert(data.message);
}

function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

loadSchedules();
</script>

</body>
</html>
