<!DOCTYPE html>
<html>
<head>

<title>Admin Bookings</title>
<link rel="stylesheet" href="admin-panel.css">

</head>

<body>

<div class="nav">
<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-routes.html">Routes</a>
<a href="admin-buses.html">Buses</a>
<a href="admin-schedules.html">Schedules</a>
<a href="admin-bookings.html">Bookings</a>
</div>

<div class="card">

<h2>All Bookings</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>User</th>
<th>Route</th>
<th>Seat</th>
<th>Status</th>
<th>Price</th>
</tr>

</thead>

<tbody id="bookings"></tbody>

</table>

</div>

<script>

async function loadBookings(){

const res=await fetch("/admin/bookings");
const data=await res.json();

let html="";

data.forEach(b=>{

html+=`
<tr>
<td>${b.id}</td>
<td>${b.user}</td>
<td>${b.origin} → ${b.destination}</td>
<td>${b.seat_number}</td>
<td>${b.status}</td>
<td>Rp ${b.price}</td>
</tr>
`;

});

document.getElementById("bookings").innerHTML=html;

}

loadBookings();

</script>

</body>
</html>
