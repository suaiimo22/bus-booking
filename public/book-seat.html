<!DOCTYPE html>
<html>
<head>

<title>Select Seat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.bus{
width:300px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.driver{
text-align:center;
font-weight:bold;
margin-bottom:20px;
}

.seat-row{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.seat{
width:40px;
height:40px;
margin:3px;
border:none;
border-radius:5px;
background:#2ecc71;
color:white;
font-size:12px;
}

.seat.booked{
background:#e74c3c;
}

.seat.selected{
background:#f1c40f;
}

.aisle{
width:20px;
}

.legend{
margin-top:20px;
text-align:center;
}

.legend span{
display:inline-block;
width:20px;
height:20px;
margin-right:5px;
border-radius:3px;
}

</style>

</head>
<body>

<div class="container mt-5">

<h3 class="text-center mb-4">Select Your Seat</h3>

<div class="bus">

<div class="driver">
Driver
</div>

<div id="seatContainer"></div>

<div class="text-center mt-3">

Selected Seat:
<strong id="selectedSeat">None</strong>

</div>

</div>

<div class="legend mt-4">

<p>
<span style="background:#2ecc71"></span> Available
</p>

<p>
<span style="background:#e74c3c"></span> Booked
</p>

<p>
<span style="background:#f1c40f"></span> Selected
</p>

</div>

</div>

<script src="seat-layout.js"></script>

</body>
</html>
