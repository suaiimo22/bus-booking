<!DOCTYPE html>
<html>
<head>

<title>Select Seat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.bus{
width:320px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.driver{
text-align:center;
font-weight:bold;
margin-bottom:20px;
}

.seat-row{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.seat{
width:40px;
height:40px;
margin:3px;
border:none;
border-radius:5px;
background:#2ecc71;
color:white;
font-size:12px;
}

.seat.booked{
background:#e74c3c;
}

.seat.selected{
background:#f1c40f;
}

.aisle{
width:20px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h3 class="text-center mb-4">Select Your Seat</h3>

<div class="bus">

<div class="driver">Driver</div>

<div id="seatContainer"></div>

<div class="text-center mt-3">

Selected Seat:
<strong id="selectedSeat">None</strong>

</div>

<div class="text-center mt-3">

<button class="btn btn-success" onclick="bookSeat()">
Book This Seat
</button>

</div>

</div>

</div>

<script>

const seatContainer = document.getElementById("seatContainer");

const rows = ["A","B","C","D","E","F","G","H"];
const cols = [1,2,3,4];

let selectedSeat = null;

const urlParams = new URLSearchParams(window.location.search);
const scheduleId = urlParams.get("schedule");

function generateSeats(bookedSeats = []){

seatContainer.innerHTML = "";

rows.forEach(row => {

let rowDiv = document.createElement("div");
rowDiv.className = "seat-row";

cols.forEach(col => {

let seat = row + col;

let seatBtn = document.createElement("button");

seatBtn.innerText = seat;
seatBtn.className = "seat";

if(bookedSeats.includes(seat)){
seatBtn.classList.add("booked");
seatBtn.disabled = true;
}

seatBtn.onclick = () => {

document.querySelectorAll(".seat").forEach(s=>{
s.classList.remove("selected")
})

seatBtn.classList.add("selected");

selectedSeat = seat;

document.getElementById("selectedSeat").innerText = seat;

}

rowDiv.appendChild(seatBtn);

if(col == 2){
let aisle = document.createElement("div");
aisle.className="aisle";
rowDiv.appendChild(aisle);
}

})

seatContainer.appendChild(rowDiv);

})

}

async function loadSeats(){

const res = await fetch(`/api/booked-seats/${scheduleId}`);
const bookedSeats = await res.json();

generateSeats(bookedSeats);

}

loadSeats();

async function bookSeat(){

const token = localStorage.getItem("token");

if(!token){
alert("Login dulu");
window.location="login.html";
return;
}

if(!selectedSeat){
alert("Pilih seat dulu");
return;
}

const res = await fetch("/bookings",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
schedule_id:scheduleId,
seat_number:selectedSeat
})

});

const data = await res.json();

alert(data.message);

window.location="my-bookings.html";

}

</script>

</body>
</html>
