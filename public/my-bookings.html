<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
<style>
body {
font-family: Arial;
padding: 20px;
}
.card {
border: 1px solid #ddd;
padding: 15px;
margin-bottom: 15px;
border-radius: 8px;
}
button {
padding: 8px 12px;
margin-right: 5px;
cursor: pointer;
}
</style>
</head>
<body>

<h2>My Bookings</h2>
<button onclick="goBack()">← Kembali</button>
<button onclick="logout()">Logout</button>

<hr>

<div id="bookingList"></div>

<script>
const token = localStorage.getItem("token");

if (!token) {
alert("Silakan login dulu");
window.location.href = "/login.html";
}

async function loadBookings() {
try {
const res = await fetch("/my-bookings", {
headers: {
Authorization: "Bearer " + token
}
});

if (res.status === 401) {
alert("Session expired, silakan login ulang");
logout();
return;
}

const data = await res.json();

const container = document.getElementById("bookingList");
container.innerHTML = "";

if (!data.length) {
container.innerHTML = "<p>Tidak ada booking</p>";
return;
}

data.forEach(b => {
const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<p><b>Rute:</b> ${b.origin} → ${b.destination}</p>
<p><b>Bus:</b> ${b.bus_name}</p>
<p><b>Seat:</b> ${b.seat_number}</p>
<p><b>Status:</b> ${b.status}</p>
<p><b>Harga:</b> Rp ${b.price}</p>
`;

if (b.status === "PENDING") {
const payBtn = document.createElement("button");
payBtn.innerText = "Bayar";
payBtn.onclick = () => payBooking(b.id);
div.appendChild(payBtn);
}

if (b.status === "PAID") {
const downloadBtn = document.createElement("button");
downloadBtn.innerText = "Download Ticket";
downloadBtn.onclick = () => downloadTicket(b.id);
div.appendChild(downloadBtn);
}

container.appendChild(div);
});

} catch (err) {
console.error(err);
alert("Gagal memuat booking");
}
}

async function payBooking(id) {
try {
const res = await fetch("/pay/" + id, {
method: "POST",
headers: {
Authorization: "Bearer " + token
}
});

const data = await res.json();
alert(data.message);

loadBookings(); // refresh otomatis

} catch (err) {
alert("Gagal bayar");
}
}

async function downloadTicket(id) {
try {
const response = await fetch("/ticket/" + id, {
headers: {
Authorization: "Bearer " + token
}
});

if (!response.ok) {
alert("Gagal download ticket");
return;
}

const blob = await response.blob();
const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "ticket.pdf";
document.body.appendChild(a);
a.click();
a.remove();

} catch (err) {
alert("Error download ticket");
}
}

function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

function goBack() {
window.location.href = "/index.html";
}

loadBookings();
</script>

</body>
</html>
