<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
</head>
<body>

<h2>My Bookings</h2>
<button onclick="goBack()">← Kembali</button>
<button onclick="logout()">Logout</button>

<div id="bookingList"></div>

<script>
const token = localStorage.getItem("token");

if (!token) {
alert("Silakan login dulu");
window.location.href = "/login.html";
}

async function loadBookings() {
const res = await fetch("/my-bookings", {
headers: {
Authorization: "Bearer " + token
}
});

const data = await res.json();

const container = document.getElementById("bookingList");
container.innerHTML = "";

if (data.length === 0) {
container.innerHTML = "<p>Tidak ada booking</p>";
return;
}

data.forEach(b => {
const div = document.createElement("div");
div.style.border = "1px solid #ccc";
div.style.padding = "10px";
div.style.marginBottom = "10px";

div.innerHTML = `
<p><b>Rute:</b> ${b.origin} → ${b.destination}</p>
<p><b>Bus:</b> ${b.bus_name}</p>
<p><b>Seat:</b> ${b.seat_number}</p>
<p><b>Status:</b> ${b.status}</p>
<p><b>Harga:</b> Rp ${b.price}</p>
`;

if (b.status === "PENDING") {
const payBtn = document.createElement("button");
payBtn.innerText = "Bayar";
payBtn.onclick = () => payBooking(b.id);
div.appendChild(payBtn);
}

if (b.status === "PAID") {
const downloadBtn = document.createElement("button");
downloadBtn.innerText = "Download Ticket";
downloadBtn.onclick = () => downloadTicket(b.id);
div.appendChild(downloadBtn);
}

container.appendChild(div);
});
}

async function payBooking(id) {
const res = await fetch("/pay/" + id, {
method: "POST",
headers: {
Authorization: "Bearer " + token
}
});

const data = await res.json();
alert(data.message);
loadBookings();
}

function downloadTicket(id) {
window.open("/ticket/" + id, "_blank");
}

function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

function goBack() {
window.location.href = "/index.html";
}

loadBookings();
</script>

</body>
</html>
