<!DOCTYPE html>
<html>
<head>

<title>My Bookings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

/* NAVBAR */

.navbar{
margin-bottom:30px;
}

/* TICKET CARD */

.ticket-card{
border:none;
border-radius:14px;
padding:20px;
background:white;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:20px;
transition:0.2s;
}

.ticket-card:hover{
transform:translateY(-3px);
}

/* ROUTE */

.route{
font-size:20px;
font-weight:bold;
}

/* PRICE */

.price{
font-weight:bold;
color:#27ae60;
}

/* FOOTER */

footer{
margin-top:80px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">🚌 Sawah Jaya Bus</a>

<div>

<a href="index.html" class="btn btn-outline-light btn-sm me-2">
Home
</a>

<a href="schedules.html" class="btn btn-outline-light btn-sm me-2">
Search Bus
</a>

</div>

</div>

</nav>

<div class="container">

<h3 class="mb-4">My Bookings</h3>

<div id="bookingList"></div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3">

<p class="mb-0">
© 2026 Sawah Jaya Bus • Online Bus Ticket Booking
</p>

</footer>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href="/login.html";
}

/* ================= LOAD BOOKINGS ================= */

async function loadBookings(){

const res = await fetch("/my-bookings",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

const container = document.getElementById("bookingList");

container.innerHTML="";

if(data.length === 0){

container.innerHTML = `
<div class="alert alert-info">
Belum ada booking
</div>
`;

return;
}

data.forEach(b=>{

container.innerHTML += `

<div class="ticket-card">

<div class="route">
${b.origin} → ${b.destination}
</div>

<p class="mb-1">
Bus: <b>${b.bus_name}</b>
</p>

<p class="mb-1">
Seat: <b>${b.seat_number}</b>
</p>

<p class="price">
Rp ${b.price}
</p>

<p class="mb-3">
Status:
<span class="badge ${b.status === 'PAID' ? 'bg-success' : 'bg-warning'}">
${b.status}
</span>
</p>

<div class="d-flex gap-2">

${b.status === "PENDING" ? `
<button onclick="payBooking(${b.id})"
class="btn btn-primary btn-sm">
Pay Now
</button>
` : ""}

${b.status === "PAID" ? `
<button onclick="downloadTicket(${b.id})"
class="btn btn-success btn-sm">
Download Ticket
</button>
` : ""}

</div>

</div>

`;

});

}

/* ================= PAY ================= */

async function payBooking(id){

const res = await fetch(`/pay/${id}`,{

method:"POST",

headers:{
Authorization:"Bearer "+token
}

});

const data = await res.json();

alert(data.message);

loadBookings();

}

/* ================= DOWNLOAD TICKET ================= */

async function downloadTicket(id){

const res = await fetch(`/ticket/${id}`,{
headers:{
Authorization:"Bearer "+token
}
});

const blob = await res.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "ticket.pdf";

document.body.appendChild(a);

a.click();

a.remove();

}

/* ================= START ================= */

loadBookings();

</script>

</body>
</html>
