<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bookings</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
background: #f4f6f9;
font-family: 'Segoe UI', sans-serif;
}
.navbar {
background: linear-gradient(90deg, #0d6efd, #0b5ed7);
}
.card {
border: none;
border-radius: 12px;
}
.price {
font-weight: bold;
color: #0d6efd;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
<div class="container">
<span class="navbar-brand fw-bold">
<i class="bi bi-ticket-perforated"></i> My Bookings
</span>
<div>
<a href="/index.html" class="btn btn-light btn-sm me-2">Back</a>
<button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>
</div>
</nav>

<div class="container mt-5">
<h3 class="fw-bold mb-4">Booking History</h3>
<div class="row" id="bookingList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const token = localStorage.getItem("token");

if (!token) {
window.location.href = "/login.html";
}

async function loadBookings() {
const res = await fetch("/my-bookings", {
headers: { Authorization: "Bearer " + token }
});

const data = await res.json();
const container = document.getElementById("bookingList");
container.innerHTML+=`
<div class="card p-3 mb-3">

<h6>${b.origin} → ${b.destination}</h6>

<p>Bus: ${b.bus_name}</p>

<p>Seat: ${b.seat_number}</p>

<p>Status: ${b.status}</p>

<button onclick="downloadTicket(${b.id})" class="btn btn-success btn-sm">
Download Ticket
</button>

</div>
`;

if (!data.length) {
container.innerHTML = "<p>Tidak ada booking</p>";
return;
}

data.forEach(b => {
const col = document.createElement("div");
col.className = "col-md-6 mb-4";

const badge = b.status === "PAID"
? '<span class="badge bg-success">Paid</span>'
: '<span class="badge bg-warning text-dark">Pending</span>';

col.innerHTML = `
<div class="card shadow-sm h-100">
<div class="card-body">
<h5 class="fw-bold">${b.origin} → ${b.destination}</h5>
<p>Bus: ${b.bus_name}</p>
<p>Seat: ${b.seat_number}</p>
<p>Status: ${badge}</p>
<p class="price">Rp ${b.price}</p>
<div id="action-${b.id}"></div>
</div>
</div>
`;

container.appendChild(col);

const actionDiv = document.getElementById("action-" + b.id);

if (b.status === "PENDING") {
actionDiv.innerHTML = `
<button class="btn btn-primary w-100"
onclick="payBooking(${b.id})">Bayar</button>
`;
}

if (b.status === "PAID") {
actionDiv.innerHTML = `
<button class="btn btn-success w-100"
onclick="downloadTicket(${b.id})">Download Ticket</button>
`;
}
});
}

async function payBooking(id) {
await fetch("/pay/" + id, {
method: "POST",
headers: { Authorization: "Bearer " + token }
});
loadBookings();
}

async function downloadTicket(id){

const token = localStorage.getItem("token");

const res = await fetch(`/ticket/${id}`,{
headers:{
Authorization:"Bearer " + token
}
});

const blob = await res.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "ticket.pdf";

document.body.appendChild(a);

a.click();

a.remove();

}

function logout() {
localStorage.removeItem("token");
window.location.href = "/login.html";
}

loadBookings();
</script>

</body>
</html>
