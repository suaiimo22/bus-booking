<!DOCTYPE html>
<html>
<head>

<title>My Bookings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.card{
border:none;
border-radius:10px;
}

</style>

</head>

<body class="p-4">

<div class="container">

<div class="d-flex justify-content-between mb-4">

<h3>My Bookings</h3>

<a href="/index.html" class="btn btn-secondary">
Back
</a>

</div>

<div id="bookingList"></div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href="/login.html";
}

/* ================= LOAD BOOKINGS ================= */

async function loadBookings(){

const res = await fetch("/my-bookings",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

const container = document.getElementById("bookingList");

container.innerHTML="";

if(data.length === 0){

container.innerHTML = `
<div class="alert alert-info">
Belum ada booking
</div>
`;

return;
}

data.forEach(b=>{

container.innerHTML += `

<div class="card p-3 mb-3 shadow-sm">

<h5>${b.origin} → ${b.destination}</h5>

<p class="mb-1">Bus: ${b.bus_name}</p>

<p class="mb-1">Seat: ${b.seat_number}</p>

<p class="mb-2">Price: Rp ${b.price}</p>

<p class="mb-3">Status: <b>${b.status}</b></p>

<div class="d-flex gap-2">

<button onclick="payBooking(${b.id})"
class="btn btn-primary btn-sm">

Pay

</button>

<button onclick="downloadTicket(${b.id})"
class="btn btn-success btn-sm">

Download Ticket

</button>

</div>

</div>

`;

});

}

/* ================= PAY ================= */

async function payBooking(id){

const res = await fetch(`/pay/${id}`,{

method:"POST",

headers:{
Authorization:"Bearer "+token
}

});

const data = await res.json();

alert(data.message);

loadBookings();

}

/* ================= DOWNLOAD TICKET ================= */

async function downloadTicket(id){

const res = await fetch(`/ticket/${id}`,{
headers:{
Authorization:"Bearer "+token
}
});

const blob = await res.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;
a.download = "ticket.pdf";

document.body.appendChild(a);

a.click();

a.remove();

}

/* ================= START ================= */

loadBookings();

</script>

</body>
</html>
