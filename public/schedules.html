<!DOCTYPE html>
<html>
<head>

<title>Bus Schedules</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.navbar{
margin-bottom:30px;
}

.bus-card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.price{
font-size:22px;
font-weight:bold;
color:#27ae60;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">🚌 Sawah Jaya Bus</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">Home</a>
<a href="my-bookings.html" class="btn btn-success btn-sm">My Tickets</a>

</div>

</div>

</nav>

<div class="container">

<h3 class="mb-4">Available Buses</h3>

<div id="busList"></div>

</div>

<script>

async function loadSchedules(){

const res = await fetch("/schedules");
const schedules = await res.json();

let html = "";

schedules.forEach(bus=>{

html += `

<div class="bus-card">

<div class="row">

<div class="col-md-6">

<h5>${bus.origin} → ${bus.destination}</h5>

<p>
Bus: <b>${bus.bus_name}</b><br>
Departure: ${bus.departure_time}<br>
Arrival: ${bus.arrival_time}<br>
Seats: ${bus.total_seats}
</p>

</div>

<div class="col-md-3 d-flex align-items-center">

<div class="price">Rp ${bus.price}</div>

</div>

<div class="col-md-3 d-flex align-items-center">

<a href="seat.html?schedule_id=${bus.id}" class="btn btn-success w-100">
Select Seat
</a>

</div>

</div>

</div>

`;

});

document.getElementById("busList").innerHTML = html;

}

loadSchedules();

</script>

</body>
</html>
