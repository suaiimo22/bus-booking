<!DOCTYPE html>
<html>
<head>

<title>Bus Schedules</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

/* NAVBAR */

.navbar{
margin-bottom:30px;
}

/* BUS CARD */

.bus-card{
background:white;
padding:25px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.2s;
}

.bus-card:hover{
transform:translateY(-4px);
}

/* PRICE */

.price{
font-size:24px;
font-weight:bold;
color:#27ae60;
}

/* ROUTE */

.route{
font-size:20px;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:80px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">🚌 Sawah Jaya Bus</a>

<div>

<a href="index.html" class="btn btn-outline-light btn-sm me-2">
Home
</a>

<a href="my-bookings.html" class="btn btn-success btn-sm">
My Tickets
</a>

</div>

</div>

</nav>

<!-- BUS LIST -->

<div class="container">

<h3 class="mb-4">Available Buses</h3>

<div id="busList"></div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3">

<p class="mb-0">
© 2026 Sawah Jaya Bus • Online Bus Ticket Booking
</p>

</footer>

<script>

async function loadSchedules(){

const res = await fetch("/schedules");
const schedules = await res.json();

let html = "";

schedules.forEach(bus=>{

html += `

<div class="bus-card">

<div class="row">

<div class="col-md-6">

<div class="route">
${bus.origin} → ${bus.destination}
</div>

<p class="mt-2 mb-1">
Bus: <b>${bus.bus_name}</b>
</p>

<p class="mb-1">
Departure: ${bus.departure_time}
</p>

<p class="mb-1">
Arrival: ${bus.arrival_time}
</p>

<p class="text-muted">
Seats: ${bus.total_seats}
</p>

</div>

<div class="col-md-3 d-flex align-items-center">

<div class="price">
Rp ${bus.price}
</div>

</div>

<div class="col-md-3 d-flex align-items-center">

<a href="book-seat.html?schedule=${bus.id}"
class="btn btn-success w-100">

Select Seat

</a>

</div>

</div>

</div>

`;

});

document.getElementById("busList").innerHTML = html;

}

loadSchedules();

</script>

</body>
</html>
