<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
margin:0;
font-family:Arial;
}

.sidebar{
width:220px;
height:100vh;
background:#2f3640;
color:white;
position:fixed;
padding:20px;
}

.sidebar h3{
color:#00a8ff;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>🚌 Bus Admin</h3>

<a href="admin-dashboard.html">Dashboard</a>
<a href="admin-routes.html">Routes</a>
<a href="admin-buses.html">Buses</a>
<a href="admin-schedules.html">Schedules</a>
<a href="admin-bookings.html">Bookings</a>

</div>

<div class="main">

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card p-3">
<h6>Total Revenue</h6>
<h3 id="revenue">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Total Bookings</h6>
<h3 id="bookings">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Total Users</h6>
<h3 id="users">0</h3>
</div>
</div>

</div>

<div class="card mt-5 p-4">

<h5>Revenue Chart</h5>

<canvas id="chart"></canvas>

</div>

</div>

<script>

async function loadStats(){

const res=await fetch("/admin/stats");
const data=await res.json();

document.getElementById("revenue").innerText="Rp "+data.revenue;
document.getElementById("bookings").innerText=data.bookings;
document.getElementById("users").innerText=data.users;

}

async function loadChart(){

const res=await fetch("/admin/revenue-chart");
const data=await res.json();

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:data.labels,
datasets:[{
label:"Revenue",
data:data.values
}]
}
});

}

loadStats();
loadChart();

</script>

</body>
</html>
