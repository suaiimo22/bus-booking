<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.cards{
display:flex;
gap:20px;
margin-top:30px;
justify-content:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
margin:0;
font-size:30px;
}

.chart-container{
width:800px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div style="margin-bottom:20px">

<a href="admin-dashboard.html">Dashboard</a> |
<a href="admin-routes.html">Routes</a> |
<a href="admin-buses.html">Buses</a> |
<a href="admin-schedules.html">Schedules</a> |
<a href="admin-bookings.html">Bookings</a>

</div>

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<p>Total Revenue</p>
<h2 id="revenue">0</h2>
</div>

<div class="card">
<p>Total Bookings</p>
<h2 id="bookings">0</h2>
</div>

<div class="card">
<p>Total Users</p>
<h2 id="users">0</h2>
</div>

</div>

<div class="chart-container">
<canvas id="revenueChart"></canvas>
</div>

<script>

async function loadStats(){

const res=await fetch("/admin/stats");
const data=await res.json();

document.getElementById("revenue").innerText="Rp "+data.revenue;
document.getElementById("bookings").innerText=data.bookings;
document.getElementById("users").innerText=data.users;

}

async function loadChart(){

const res=await fetch("/admin/revenue-chart");
const data=await res.json();

const ctx=document.getElementById("revenueChart");

new Chart(ctx,{
type:"bar",
data:{
labels:data.labels,
datasets:[{
label:"Revenue",
data:data.values
}]
}
});

}

loadStats();
loadChart();

</script>

</body>
</html>
