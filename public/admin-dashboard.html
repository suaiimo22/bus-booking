<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
font-family:'Segoe UI',sans-serif;
}

.sidebar{
width:230px;
min-height:100vh;
background:#111827;
color:white;
position:fixed;
padding:20px;
}

.sidebar h4{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#d1d5db;
text-decoration:none;
padding:10px;
border-radius:6px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}

.main{
margin-left:230px;
padding:30px;
}

.card{
border:none;
border-radius:12px;
}

</style>
</head>

<body>

<div class="sidebar">

<h4><i class="bi bi-bus-front"></i> Bus Admin</h4>

<a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="#"><i class="bi bi-map"></i> Schedules</a>
<a href="#"><i class="bi bi-ticket"></i> Bookings</a>
<a href="#"><i class="bi bi-graph-up"></i> Revenue</a>

<hr>

<button onclick="logout()" class="btn btn-danger w-100">
Logout
</button>

</div>

<div class="main">

<h3 class="mb-4">Dashboard</h3>

<div class="row mb-4">

<div class="col-md-3">
<div class="card p-3 text-center">
<h6>Total Bookings</h6>
<h3 id="totalBookings">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h6>Total Pending</h6>
<h3 id="totalPending">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h6>Total Paid</h6>
<h3 id="totalPaid">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<h6>Total Revenue</h6>
<h3 id="totalRevenue">0</h3>
</div>
</div>

</div>

<!-- REVENUE CHART -->
<div class="card p-4 mb-4">

<h5 class="mb-3">Revenue Chart</h5>

<canvas id="revenueChart" height="100"></canvas>

</div>

<div class="card p-4">

<div class="d-flex justify-content-between mb-3">

<h5>Manage Routes</h5>

<button class="btn btn-primary btn-sm" onclick="openAddModal()">
Add Route
</button>

</div>

<div id="scheduleList"></div>

</div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">
<div class="modal-dialog">
<div class="modal-content p-4">

<h5>Edit Schedule</h5>

<input id="editOrigin" class="form-control mb-2" placeholder="Origin">
<input id="editDestination" class="form-control mb-2" placeholder="Destination">
<input id="editBus" class="form-control mb-2" placeholder="Bus Name">
<input id="editPrice" type="number" class="form-control mb-3" placeholder="Price">

<button class="btn btn-success w-100" onclick="saveSchedule()">
Save Changes
</button>

</div>
</div>
</div>

<!-- ADD MODAL -->
<div class="modal fade" id="addModal">
<div class="modal-dialog">
<div class="modal-content p-4">

<h5>Add Schedule</h5>

<input id="addOrigin" class="form-control mb-2" placeholder="Origin">
<input id="addDestination" class="form-control mb-2" placeholder="Destination">
<input id="addBus" class="form-control mb-2" placeholder="Bus Name">
<input id="addPrice" type="number" class="form-control mb-3" placeholder="Price">

<button class="btn btn-success w-100" onclick="saveNewSchedule()">
Add Schedule
</button>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const token = localStorage.getItem("token");

if(!token) window.location.href="/login.html";

let currentScheduleId=null;

const editModal=new bootstrap.Modal(document.getElementById("editModal"));
const addModal=new bootstrap.Modal(document.getElementById("addModal"));

/* DASHBOARD STATS */

async function loadDashboard(){

const res=await fetch("/admin/dashboard",{
headers:{Authorization:"Bearer "+token}
});

const data=await res.json();

document.getElementById("totalBookings").innerText=data.totalBookings;
document.getElementById("totalPending").innerText=data.totalPending;
document.getElementById("totalPaid").innerText=data.totalPaid;
document.getElementById("totalRevenue").innerText="Rp "+data.totalRevenue;

}

/* REVENUE CHART */

async function loadRevenueChart(){

const res = await fetch("/admin/revenue",{
headers:{Authorization:"Bearer "+token}
});

const data = await res.json();

const labels = data.map(r => r.date);
const revenues = data.map(r => r.revenue);

const ctx = document.getElementById("revenueChart");

new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Daily Revenue",
data:revenues,
borderWidth:3,
tension:0.3
}]
},
options:{
responsive:true,
plugins:{
legend:{display:true}
}
}
});

}

/* LOAD SCHEDULE */

async function loadSchedules(){

const res=await fetch("/admin/schedules",{
headers:{Authorization:"Bearer "+token}
});

const data=await res.json();

const container=document.getElementById("scheduleList");

container.innerHTML="";

data.forEach(s=>{

container.innerHTML+=`

<div class="border rounded p-3 mb-3">

<h6>${s.origin} → ${s.destination}</h6>

<p>Bus: ${s.bus_name}</p>

<p>Harga: Rp ${s.price}</p>

<button class="btn btn-warning btn-sm me-2"
onclick="editSchedule(${s.id},'${s.origin}','${s.destination}','${s.bus_name}',${s.price})">
Edit
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteSchedule(${s.id})">
Delete
</button>

</div>

`;

});

}

/* EDIT */

function editSchedule(id,origin,destination,bus,price){

currentScheduleId=id;

document.getElementById("editOrigin").value=origin;
document.getElementById("editDestination").value=destination;
document.getElementById("editBus").value=bus;
document.getElementById("editPrice").value=price;

editModal.show();

}

async function saveSchedule(){

const origin=document.getElementById("editOrigin").value;
const destination=document.getElementById("editDestination").value;
const bus_name=document.getElementById("editBus").value;
const price=document.getElementById("editPrice").value;

const res=await fetch(`/admin/schedules/${currentScheduleId}`,{

method:"PUT",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({origin,destination,bus_name,price})

});

const data=await res.json();

alert(data.message);

editModal.hide();

loadSchedules();

}

/* ADD */

function openAddModal(){

document.getElementById("addOrigin").value="";
document.getElementById("addDestination").value="";
document.getElementById("addBus").value="";
document.getElementById("addPrice").value="";

addModal.show();

}

async function saveNewSchedule(){

const origin=document.getElementById("addOrigin").value;
const destination=document.getElementById("addDestination").value;
const bus_name=document.getElementById("addBus").value;
const price=document.getElementById("addPrice").value;

const res=await fetch("/admin/schedules",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({origin,destination,bus_name,price})

});

const data=await res.json();

alert(data.message);

addModal.hide();

loadSchedules();

}

/* DELETE */

async function deleteSchedule(id){

if(!confirm("Delete schedule ini?")) return;

const res=await fetch(`/admin/schedules/${id}`,{

method:"DELETE",

headers:{Authorization:"Bearer "+token}

});

const data=await res.json();

alert(data.message);

loadSchedules();

}

function logout(){

localStorage.removeItem("token");

window.location.href="/login.html";

}

/* LOAD PAGE */

loadDashboard();
loadSchedules();
loadRevenueChart();

</script>

</body>
</html>
