<!DOCTYPE html>
<html>
<head>

<title>Admin Tours</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.table img{
width:80px;
border-radius:10px;
}

</style>

</head>
<body>

<div class="container mt-5">

<div class="header">

<h3>Manage Tour Packages</h3>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tourModal">
Add Tour
</button>

</div>

<div class="card p-4">

<table class="table align-middle">

<thead>

<tr>
<th>Image</th>
<th>Name</th>
<th>Location</th>
<th>Price</th>
<th>Duration</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tourTable"></tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal fade" id="tourModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Add Tour</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input type="hidden" id="tourId">

<div class="mb-3">
<label>Tour Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" id="location" class="form-control">
</div>

<div class="mb-3">
<label>Duration</label>
<input type="text" id="duration" class="form-control">
</div>

<div class="mb-3">
<label>Price</label>
<input type="number" id="price" class="form-control">
</div>

<div class="mb-3">
<label>Image URL</label>
<input type="text" id="image" class="form-control">
</div>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>

<button class="btn btn-primary" onclick="saveTour()">Save</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API="/admin/tours"

async function loadTours(){

const res=await fetch(API)

const tours=await res.json()

let html=""

tours.forEach(t=>{

html+=`

<tr>

<td><img src="${t.image}"></td>

<td>${t.name}</td>

<td>${t.location}</td>

<td>$${t.price}</td>

<td>${t.duration}</td>

<td>

<button class="btn btn-warning btn-sm" onclick='editTour(${JSON.stringify(t)})'>Edit</button>

<button class="btn btn-danger btn-sm" onclick="deleteTour(${t.id})">Delete</button>

</td>

</tr>

`

})

document.getElementById("tourTable").innerHTML=html

}

async function saveTour(){

const id=document.getElementById("tourId").value

const data={

name:document.getElementById("name").value,
location:document.getElementById("location").value,
duration:document.getElementById("duration").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value

}

if(id){

await fetch(API+"/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

}else{

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

}

location.reload()

}

function editTour(t){

document.getElementById("tourId").value=t.id
document.getElementById("name").value=t.name
document.getElementById("location").value=t.location
document.getElementById("duration").value=t.duration
document.getElementById("price").value=t.price
document.getElementById("image").value=t.image

new bootstrap.Modal(document.getElementById("tourModal")).show()

}

async function deleteTour(id){

if(!confirm("Delete this tour?")) return

await fetch(API+"/"+id,{
method:"DELETE"
})

loadTours()

}

loadTours()

</script>

</body>
</html>
